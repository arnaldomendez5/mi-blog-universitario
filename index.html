    <style>
        * { box-sizing: border-box; }
        
        /* PAPEL TAPIZ SUTIL CON CSS (Patrón de cuadrícula universitaria) */
        body { 
            font-family: sans-serif; 
            line-height: 1.6; 
            max-width: 800px;

            padding: 20px; 
            color: #333;

        }

        .post-preview h2 {
            margin: 0 0 5px 0;
            font-size: 1.3rem;
        }

        .post-preview h2 a {
            color: #2c3e50;
            text-decoration: none;
        }

        .post-preview h2 a:hover {
            text-decoration: underline;
        }

        .post-preview .resumen {
            margin: 8px 0;
            color: #555;
        }

        .post-preview .fecha {
            color: #888;
            font-size: 0.85rem;
        }

        .post-preview .etiquetas {
            margin-top: 8px;
        }

        .post-preview .etiqueta {
            display: inline-block;
            background: #eef2f7;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #555;
            margin-right: 5px;
        }

        /* Responsive para móvil */
        @media (max-width: 600px) {
            .post-preview h2 {
                font-size: 1.1rem;
            }
        }
        /* ===== FIN ESTILOS NUEVOS ===== */

        /* Puedes mantener el resto de tus estilos personalizados aquí */
    </style>
</head>

<!-- ===== REPRODUCTOR DE MÚSICA ===== -->
<div style="background: #1a1a2e; padding: 15px; border-radius: 12px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
    <div style="display: flex; align-items: center; gap: 10px; color: white; font-family: Arial, sans-serif;">
        <!-- Botón Play/Pausa -->
        <button id="playBtn" style="background: #e94560; border: none; color: white; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">▶</button>
        
        <!-- Info de la canción -->
        <div style="flex: 1; min-width: 0;">
            <div id="songTitle" style="font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">🎵 Canciones</div>
            <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px;">
                <span id="song1" style="background: #0f3460; padding: 2px 10px; border-radius: 10px; font-size: 11px; cursor: pointer; transition: 0.3s;">Relax</span>
                <span id="song2" style="background: #0f3460; padding: 2px 10px; border-radius: 10px; font-size: 11px; cursor: pointer; transition: 0.3s;">Estudio</span>
                <span id="song3" style="background: #0f3460; padding: 2px 10px; border-radius: 10px; font-size: 11px; cursor: pointer; transition: 0.3s;">Energía</span>
            </div>
        </div>
    </div>
    
    <!-- Reproductor oculto -->
    <audio id="miniPlayer" style="width: 100%; margin-top: 8px; border-radius: 6px;"></audio>
</div>

<script>
    // ===== CONFIGURACIÓN =====
    const songs = [
        { name: 'Relax', file: './songs/relax.mp3' },
        { name: 'Estudio', file: './songs/estudio.mp3' },
        { name: 'Energía', file: './songs/energia.mp3' }
    ];

    // ===== CÓDIGO DEL REPRODUCTOR =====
    const player = document.getElementById('miniPlayer');
    const playBtn = document.getElementById('playBtn');
    const songTitle = document.getElementById('songTitle');

    let currentSongIndex = 0;
    let isPlaying = false;

    function loadSong(index) {
        if (index >= 0 && index < songs.length) {
            currentSongIndex = index;
            player.src = songs[index].file;
            songTitle.textContent = '🎵 ' + songs[index].name;
            
            // Resaltar canción seleccionada
            document.querySelectorAll('#song1, #song2, #song3').forEach((el, i) => {
                el.style.background = i === index ? '#e94560' : '#0f3460';
            });
        }
    }

    function togglePlay() {
        if (player.src) {
            if (player.paused) {
                player.play();
                playBtn.textContent = '⏸';
                isPlaying = true;
            } else {
                player.pause();
                playBtn.textContent = '▶';
                isPlaying = false;
            }
        } else {
            loadSong(0);
            player.play();
            playBtn.textContent = '⏸';
            isPlaying = true;
        }
    }

    // Evento al terminar canción
    player.addEventListener('ended', function() {
        let next = (currentSongIndex + 1) % songs.length;
        loadSong(next);
        player.play();
    });

    // Evento al hacer clic en una canción
    document.getElementById('song1').addEventListener('click', function() {
        loadSong(0);
        if (!player.paused) player.play();
        else {
            player.play();
            playBtn.textContent = '⏸';
        }
    });
    document.getElementById('song2').addEventListener('click', function() {
        loadSong(1);
        if (!player.paused) player.play();
        else {
            player.play();
            playBtn.textContent = '⏸';
        }
    });
    document.getElementById('song3').addEventListener('click', function() {
        loadSong(2);
        if (!player.paused) player.play();
        else {
            player.play();
            playBtn.textContent = '⏸';
        }
    });

    // Evento del botón Play
    playBtn.addEventListener('click', togglePlay);

    // Cargar la primera canción al inicio
    loadSong(0);
</script>
<!-- ===== FIN REPRODUCTOR ===== -->

    <!-- ===== SCRIPT PARA CARGAR ARTÍCULOS ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('entradas/lista.json')
                .then(res => {
                    if (!res.ok) throw new Error('No se pudo cargar la lista de artículos');
                    return res.json();
                })
                .then(articulos => {
                    const contenedor = document.getElementById('lista-articulos');
                    if (!contenedor) return;
                    
                    // Ordenar por fecha (más reciente primero)
                    articulos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                    
                    const html = articulos.map(a => `
                        <article class="post-preview">
                            <h2><a href="entradas/${a.archivo}">${a.titulo}</a></h2>
                            <p class="resumen">${a.resumen}</p>
                            <small class="fecha">📅 ${formatearFecha(a.fecha)}</small>
                            ${a.etiquetas ? `<div class="etiquetas">${a.etiquetas.map(t => `<span class="etiqueta">#${t}</span>`).join(' ')}</div>` : ''}
                        </article>
                    `).join('');
                    
                    contenedor.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error:', error);
                    const contenedor = document.getElementById('lista-articulos');
                    if (contenedor) {
                        contenedor.innerHTML = '<p style="color: #c0392b;">⚠️ No se pudieron cargar los artículos. Intenta más tarde.</p>';
                    }
                });
        });

        function formatearFecha(fechaStr) {
            const fecha = new Date(fechaStr);
            const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
            return fecha.toLocaleDateString('es-ES', opciones);
        }
    </script>
    <!-- ===== FIN SCRIPT ===== -->

</body>
