<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog Universitario | Apuntes, Código y Proyectos</title>
    <meta name="description" content="Espacio digital de aprendizaje, apuntes universitarios, desarrollo web y guías prácticas para estudiantes.">
    <style>
        * { box-sizing: border-box; }
        
        /* PAPEL TAPIZ SUTIL CON CSS (Patrón de cuadrícula universitaria) */
        body { 
            font-family: sans-serif; 
            line-height: 1.6; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            color: #333; 
            background-color: #e5e9f0;
            background-image: 
                linear-gradient(#ffffff 2px, transparent 2px),
                linear-gradient(90deg, #ffffff 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: -2px -2px;
        }

        /* Contenedor principal blanco para que el texto resalte sobre el fondo */
        header, nav, .tarjeta-articulo, footer { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px; 
        }

        /* ===== NUEVOS ESTILOS PARA ARTÍCULOS DINÁMICOS ===== */
        .post-preview {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .post-preview:last-child {
            border-bottom: none;
        }

        .post-preview h2 {
            margin: 0 0 5px 0;
            font-size: 1.3rem;
        }

        .post-preview h2 a {
            color: #2c3e50;
            text-decoration: none;
        }

        .post-preview h2 a:hover {
            text-decoration: underline;
        }

        .post-preview .resumen {
            margin: 8px 0;
            color: #555;
        }

        .post-preview .fecha {
            color: #888;
            font-size: 0.85rem;
        }

        .post-preview .etiquetas {
            margin-top: 8px;
        }

        .post-preview .etiqueta {
            display: inline-block;
            background: #eef2f7;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #555;
            margin-right: 5px;
        }

        /* Responsive para móvil */
        @media (max-width: 600px) {
            .post-preview h2 {
                font-size: 1.1rem;
            }
        }
        /* ===== FIN ESTILOS NUEVOS ===== */

        /* Puedes mantener el resto de tus estilos personalizados aquí */
    </style>
</head>
<body>

    <header>
        <h1>📘 Mi Blog Universitario</h1>
        <p>Compartiendo conocimiento, código y técnicas de aprendizaje</p>
    </header>

    <nav>
        <a href="#">Inicio</a> | 
        <a href="#">Categorías</a> | 
        <a href="#">Sobre mí</a> | 
        <a href="contacto.html">Contacto</a>
    </nav>

    <!-- ===== SECCIÓN DE ARTÍCULOS DINÁMICOS ===== -->
    <section id="articulos" class="tarjeta-articulo">
        <h2>📖 Últimas Entradas</h2>
        <div id="lista-articulos">
            <p style="color: #888;">Cargando artículos...</p>
        </div>
    </section>
    <!-- ===== FIN SECCIÓN ARTÍCULOS ===== -->

    <!-- Puedes mantener el resto de tu contenido aquí (sidebar, etc.) -->

    <footer>
        <p>© 2026 Mi Blog Universitario. Hecho con 📚 y ☕.</p>
    </footer>

    <!-- ===== SCRIPT PARA CARGAR ARTÍCULOS ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('entradas/lista.json')
                .then(res => {
                    if (!res.ok) throw new Error('No se pudo cargar la lista de artículos');
                    return res.json();
                })
                .then(articulos => {
                    const contenedor = document.getElementById('lista-articulos');
                    if (!contenedor) return;
                    
                    // Ordenar por fecha (más reciente primero)
                    articulos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                    
                    const html = articulos.map(a => `
                        <article class="post-preview">
                            <h2><a href="entradas/${a.archivo}">${a.titulo}</a></h2>
                            <p class="resumen">${a.resumen}</p>
                            <small class="fecha">📅 ${formatearFecha(a.fecha)}</small>
                            ${a.etiquetas ? `<div class="etiquetas">${a.etiquetas.map(t => `<span class="etiqueta">#${t}</span>`).join(' ')}</div>` : ''}
                        </article>
                    `).join('');
                    
                    contenedor.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error:', error);
                    const contenedor = document.getElementById('lista-articulos');
                    if (contenedor) {
                        contenedor.innerHTML = '<p style="color: #c0392b;">⚠️ No se pudieron cargar los artículos. Intenta más tarde.</p>';
                    }
                });
        });

        function formatearFecha(fechaStr) {
            const fecha = new Date(fechaStr);
            const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
            return fecha.toLocaleDateString('es-ES', opciones);
        }
    </script>
    <!-- ===== FIN SCRIPT ===== -->

</body>
</html>
