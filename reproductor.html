<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Reproductor de Música</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .player {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .player h1 {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #e94560;
        }
        .playlist-item {
            display: block;
            background: #0f3460;
            color: white;
            padding: 12px 18px;
            margin: 8px 0;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
        }
        .playlist-item:hover, .playlist-item.active {
            background: #e94560;
        }
        .audio-player {
            width: 100%;
            margin: 15px 0;
            border-radius: 10px;
        }
        .now-playing {
            text-align: center;
            color: #aaa;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="player">
    <h1>🎵 Mi Playlist</h1>

    <!-- Lista de canciones -->
    <div id="playlist">
        <a class="playlist-item active" href="./songs/relax.mp3">Relax</a>
        <a class="playlist-item" href="./songs/estudio.mp3">Estudio</a>
        <a class="playlist-item" href="./songs/energia.mp3">Energía</a>
    </div>

    <!-- Reproductor de audio -->
    <audio id="audioPlayer" class="audio-player" controls>
        Tu navegador no soporta audio.
    </audio>

    <div class="now-playing" id="nowPlaying">▶️ Reproduciendo: Relax</div>
</div>

<script>
    const items = document.querySelectorAll('.playlist-item');
    const player = document.getElementById('audioPlayer');
    const nowPlaying = document.getElementById('nowPlaying');

    items.forEach(item => {
        item.addEventListener('click', function(e) {
            e.preventDefault();

            // Cambiar clase activa
            items.forEach(i => i.classList.remove('active'));
            this.classList.add('active');

            // Reproducir canción
            const songUrl = this.getAttribute('href');
            player.src = songUrl;
            player.play();

            // Actualizar texto
            nowPlaying.textContent = '▶️ Reproduciendo: ' + this.textContent;
        });
    });

    // Cuando termina una canción, pasar a la siguiente
    player.addEventListener('ended', function() {
        let current = document.querySelector('.playlist-item.active');
        let next = current.nextElementSibling;
        if (next) {
            next.click();
        } else {
            // Si es la última, volver a la primera
            let first = document.querySelector('.playlist-item');
            first.click();
        }
    });
</script>

</body>
</html>
