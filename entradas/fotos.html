<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Fotografías</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<main class="entrada">

    <h1>Galería de Fotografías</h1>

    <p>
        En esta sección comparto algunas imágenes relacionadas con el tema de esta entrada.
        Cada fotografía cuenta con una breve descripción para aportar contexto.
    </p>

    <div class="galeria">

        <figure class="foto">
            <img src="../img/foto1.jpg" alt="Fotografía 1">
            <figcaption>
                <h3>Fotografía 1</h3>
                <p>Aquí puedes escribir una descripción de la imagen. Explica qué se observa o por qué es importante.</p>
            </figcaption>
        </figure>

        <figure class="foto">
            <img src="../img/foto2.jpg" alt="Fotografía 2">
            <figcaption>
                <h3>Fotografía 2</h3>
                <p>Descripción de la segunda fotografía.</p>
            </figcaption>
        </figure>

        <figure class="foto">
            <img src="../img/foto3.jpg" alt="Fotografía 3">
            <figcaption>
                <h3>Fotografía 3</h3>
                <p>Descripción de la tercera fotografía.</p>
            </figcaption>
        </figure>

        <figure class="foto">
            <img src="../img/foto4.jpg" alt="Fotografía 4">
            <figcaption>
                <h3>Fotografía 4</h3>
                <p>Descripción de la cuarta fotografía.</p>
            </figcaption>
        </figure>

    </div>

</main>

</body>
</html>
